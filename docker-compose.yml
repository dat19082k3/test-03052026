x-logging: &default-logging
  driver: "json-file"
  options:
    max-size: "10m"
    max-file: "3"

x-app-env: &app-env
  NODE_ENV: ${NODE_ENV:-production}
  LOG_LEVEL: ${LOG_LEVEL:-info}

x-db-env: &db-env
  DB_HOST: postgres
  DB_PORT: 5432
  DB_DATABASE: ${DB_DATABASE:-fullstack_db}
  DB_USERNAME: ${DB_USERNAME:-postgres}
  DB_PASSWORD: ${DB_PASSWORD:?database password required}
  DATABASE_URL: postgres://${DB_USERNAME:-postgres}:${DB_PASSWORD}@postgres:5432/${DB_DATABASE:-fullstack_db}

x-redis-env: &redis-env
  REDIS_HOST: redis
  REDIS_PORT: 6379
  REDIS_PASSWORD: ${REDIS_PASSWORD:?redis password required}
  REDIS_DB: ${REDIS_DB:-0}

services:
  postgres:
    image: postgres:15-alpine
    restart: unless-stopped
    logging: *default-logging
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME:-postgres} -d ${DB_DATABASE:-fullstack_db}"]
      interval: 10s
      timeout: 5s
      retries: 5
    environment:
      POSTGRES_USER: ${DB_USERNAME:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:?database password required}
      POSTGRES_DB: ${DB_DATABASE:-fullstack_db}
    # No ports exposed to host in production
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - app_network

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    logging: *default-logging
    command: redis-server --requirepass ${REDIS_PASSWORD:?redis password required}
    healthcheck:
      test: ["CMD-SHELL", "export REDISCLI_AUTH=$${REDIS_PASSWORD}; redis-cli ping | grep PONG"]
      interval: 10s
      timeout: 5s
      retries: 5
    environment:
      REDIS_PASSWORD: ${REDIS_PASSWORD:?redis password required}
    # No ports exposed to host in production
    volumes:
      - redis_data:/data
    networks:
      - app_network

  migration:
    build:
      context: .
      dockerfile: apps/backend/Dockerfile
    restart: "no"
    logging: *default-logging
    environment:
      <<: [*app-env, *db-env]
    command: ["npm", "run", "migrate", "-w", "backend", "--", "up"]
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - app_network

  backend:
    build:
      context: .
      dockerfile: apps/backend/Dockerfile
    restart: unless-stopped
    logging: *default-logging
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://127.0.0.1:${BACKEND_PORT:-4000}/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    environment:
      <<: [*app-env, *db-env, *redis-env]
      PORT: ${BACKEND_PORT:-4000}
    ports:
      - "${BACKEND_PORT:-4000}:4000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      migration:
        condition: service_completed_successfully
    networks:
      - app_network

  worker:
    build:
      context: .
      dockerfile: apps/worker/Dockerfile
    restart: unless-stopped
    logging: *default-logging
    # Basic process check for worker health
    healthcheck:
      test: ["CMD-SHELL", "ps | grep -v grep | grep 'node apps/worker/dist/index.js' || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
    environment:
      <<: [*app-env, *db-env, *redis-env]
      WORKER_CONCURRENCY: ${WORKER_CONCURRENCY:-2}
      INVENTORY_VOUCHER_TEMPLATE_PATH: ${INVENTORY_VOUCHER_TEMPLATE_PATH:-/templates/pn.xlsx}
      EXCEL_EXPORT_DIR: ${EXCEL_EXPORT_DIR:-/app/storage/exports}
      EXCEL_EXPORT_BATCH_SIZE: ${EXCEL_EXPORT_BATCH_SIZE:-5000}
      EXCEL_IMPORT_BATCH_SIZE: ${EXCEL_IMPORT_BATCH_SIZE:-1000}
    volumes:
      - ${VOUCHER_TEMPLATE_HOST_PATH:-./pn.xlsx}:/templates/pn.xlsx:ro
      - worker_exports:/app/storage/exports
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      migration:
        condition: service_completed_successfully
    networks:
      - app_network

  frontend:
    build:
      context: .
      dockerfile: apps/frontend/Dockerfile
    restart: unless-stopped
    logging: *default-logging
    environment:
      <<: *app-env
      API_URL: ${API_URL:-http://backend:${BACKEND_PORT:-4000}/api/v1}
      PORT: ${FRONTEND_PORT:-3000}
    ports:
      - "${FRONTEND_PORT:-3000}:3000"
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - app_network

networks:
  app_network:
    driver: bridge

volumes:
  postgres_data:
  redis_data:
  worker_exports:
