x-logging: &default-logging
  driver: "json-file"
  options:
    max-size: "10m"
    max-file: "3"

x-app-env: &app-env
  NODE_ENV: ${NODE_ENV:-production}
  LOG_LEVEL: ${LOG_LEVEL:-info}

x-db-env: &db-env
  DB_HOST: postgres
  DB_PORT: 5432
  DB_DATABASE: ${DB_DATABASE:-fullstack_db}
  DB_USERNAME: ${DB_USERNAME:-postgres}
  DB_PASSWORD: ${DB_PASSWORD:?database password required}
  DATABASE_URL: postgres://${DB_USERNAME:-postgres}:${DB_PASSWORD}@postgres:5432/${DB_DATABASE:-fullstack_db}

x-redis-env: &redis-env
  REDIS_HOST: redis
  REDIS_PORT: 6379
  REDIS_PASSWORD: ${REDIS_PASSWORD:?redis password required}
  REDIS_DB: ${REDIS_DB:-0}

services:
  postgres:
    image: postgres:15-alpine
    restart: unless-stopped
    logging: *default-logging
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME:-postgres} -d ${DB_DATABASE:-fullstack_db}"]
      interval: 10s
      timeout: 5s
      retries: 5
    environment:
      POSTGRES_USER: ${DB_USERNAME:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:?database password required}
      POSTGRES_DB: ${DB_DATABASE:-fullstack_db}
    # No ports exposed to host in production
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - app_network

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    logging: *default-logging
    command: redis-server --requirepass ${REDIS_PASSWORD:?redis password required}
    healthcheck:
      test: ["CMD-SHELL", "export REDISCLI_AUTH=$${REDIS_PASSWORD}; redis-cli ping | grep PONG"]
      interval: 10s
      timeout: 5s
      retries: 5
    environment:
      REDIS_PASSWORD: ${REDIS_PASSWORD:?redis password required}
    # No ports exposed to host in production
    volumes:
      - redis_data:/data
    networks:
      - app_network

  migration:
    build:
      context: .
      dockerfile: apps/backend/Dockerfile
    restart: "no"
    logging: *default-logging
    environment:
      <<: [*app-env, *db-env]
    command: ["npm", "run", "migrate", "-w", "backend", "--", "up"]
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - app_network

  backend:
    build:
      context: .
      dockerfile: apps/backend/Dockerfile
    restart: unless-stopped
    logging: *default-logging
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://127.0.0.1:${BACKEND_PORT:-4000}/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    environment:
      <<: [*app-env, *db-env, *redis-env]
      PORT: ${BACKEND_PORT:-4000}
      # S3 Configuration
      S3_ENDPOINT: ${S3_ENDPOINT:-http://minio:9000}
      S3_REGION: ${S3_REGION:-us-east-1}
      S3_ACCESS_KEY: ${S3_ACCESS_KEY:-minioadmin}
      S3_SECRET_KEY: ${S3_SECRET_KEY:-minioadmin}
      S3_BUCKET: ${S3_BUCKET:-inventory-vouchers}
      S3_FORCE_PATH_STYLE: ${S3_FORCE_PATH_STYLE:-true}
      AWS_ACCESS_KEY_ID: ${S3_ACCESS_KEY:-minioadmin}
      AWS_SECRET_ACCESS_KEY: ${S3_SECRET_KEY:-minioadmin}
      AWS_REGION: ${S3_REGION:-us-east-1}
    ports:
      - "${BACKEND_PORT:-4000}:4000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      migration:
        condition: service_completed_successfully
    networks:
      - app_network

  worker:
    build:
      context: .
      dockerfile: apps/worker/Dockerfile
    restart: unless-stopped
    logging: *default-logging
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "node -e \"fetch('http://127.0.0.1:'+(process.env.WORKER_HEALTH_PORT||9090)+'/health').then(r=>r.json().then(j=>process.exit(j.ok?0:1))).catch(()=>process.exit(1))\"",
        ]
      interval: 30s
      timeout: 15s
      retries: 3
      start_period: 45s
    environment:
      <<: [*app-env, *db-env, *redis-env]
      WORKER_CONCURRENCY: ${WORKER_CONCURRENCY:-2}
      WORKER_HEALTH_PORT: ${WORKER_HEALTH_PORT:-9090}
      INVENTORY_VOUCHER_TEMPLATE_PATH: ${INVENTORY_VOUCHER_TEMPLATE_PATH:-/templates/phieu_nhap_kho.xlsx}
      EXCEL_EXPORT_DIR: ${EXCEL_EXPORT_DIR:-/app/storage/exports}
      EXCEL_EXPORT_BATCH_SIZE: ${EXCEL_EXPORT_BATCH_SIZE:-5000}
      EXCEL_IMPORT_BATCH_SIZE: ${EXCEL_IMPORT_BATCH_SIZE:-1000}
      # S3 Configuration
      S3_ENDPOINT: ${S3_ENDPOINT:-http://minio:9000}
      S3_REGION: ${S3_REGION:-us-east-1}
      S3_ACCESS_KEY: ${S3_ACCESS_KEY:-minioadmin}
      S3_SECRET_KEY: ${S3_SECRET_KEY:-minioadmin}
      S3_BUCKET: ${S3_BUCKET:-inventory-vouchers}
      S3_FORCE_PATH_STYLE: ${S3_FORCE_PATH_STYLE:-true}
      AWS_ACCESS_KEY_ID: ${S3_ACCESS_KEY:-minioadmin}
      AWS_SECRET_ACCESS_KEY: ${S3_SECRET_KEY:-minioadmin}
      AWS_REGION: ${S3_REGION:-us-east-1}
      S3_VOUCHER_FORM_TEMPLATE_KEY: ${S3_VOUCHER_FORM_TEMPLATE_KEY:-templates/phieu_nhap_kho.xlsx}
      S3_VOUCHER_LIST_TEMPLATE_KEY: ${S3_VOUCHER_LIST_TEMPLATE_KEY:-templates/danh_sach_phieu_nhap_kho.xlsx}
    volumes:
      - ${VOUCHER_TEMPLATE_HOST_PATH:-./packages/templates/phieu_nhap_kho.xlsx}:/templates/phieu_nhap_kho.xlsx:ro
      - worker_exports:/app/storage/exports
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      migration:
        condition: service_completed_successfully
      minio-init:
        condition: service_completed_successfully
    networks:
      - app_network

  minio:
    image: minio/minio:latest
    restart: unless-stopped
    logging: *default-logging
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${S3_ACCESS_KEY:?S3 access key required}
      MINIO_ROOT_PASSWORD: ${S3_SECRET_KEY:?S3 secret key required}
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    networks:
      - app_network

  minio-init:
    image: minio/mc:latest
    depends_on:
      - minio
    logging: *default-logging
    volumes:
      - ./packages/templates:/initial-templates:ro
    entrypoint: >
      /bin/sh -c "
      until (/usr/bin/mc alias set local http://minio:9000 $${S3_ACCESS_KEY} $${S3_SECRET_KEY}) do echo '...waiting for MinIO...' && sleep 1; done;
      /usr/bin/mc mb --ignore-existing local/${S3_BUCKET:-inventory-vouchers};
      /usr/bin/mc anonymous set public local/${S3_BUCKET:-inventory-vouchers};
      /usr/bin/mc cp /initial-templates/phieu_nhap_kho.xlsx local/${S3_BUCKET:-inventory-vouchers}/templates/phieu_nhap_kho.xlsx;
      /usr/bin/mc cp /initial-templates/danh_sach_phieu_nhap_kho.xlsx local/${S3_BUCKET:-inventory-vouchers}/templates/danh_sach_phieu_nhap_kho.xlsx;
      echo 'MinIO Bucket created and templates uploaded successfully';
      "
    networks:
      - app_network

  frontend:
    build:
      context: .
      dockerfile: apps/frontend/Dockerfile
    restart: unless-stopped
    logging: *default-logging
    environment:
      <<: *app-env
      API_URL: ${API_URL:-http://backend:${BACKEND_PORT:-4000}/api/v1}
      PORT: ${FRONTEND_PORT:-3000}
    ports:
      - "${FRONTEND_PORT:-3000}:3000"
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - app_network

networks:
  app_network:
    driver: bridge

volumes:
  postgres_data:
  redis_data:
  worker_exports:
  minio_data:
